<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式幸運轉盤 (3D懸浮手指版)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #5c5c5c; /* 把背景調暗一點，更能凸顯立體光影 */
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            cursor: pointer; 
        }

        /* 建立 3D 攝影機視角 */
        .scene {
            position: relative;
            width: 500px;
            height: 500px;
            perspective: 1200px; /* 視角深度，數字越小透視感越強烈 */
            margin-bottom: 50px;
        }

        /* 轉盤本體 (做出厚度與傾斜) */
        .wheel-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #dcb38a;
            /* 將圓盤向後倒 (rotateX)，產生放在桌面上的感覺 */
            transform: rotateX(60deg); 
            /* 利用陰影做出木板的 3D 厚度 (向下延伸 15px) 與落地陰影 */
            box-shadow: 
                0 15px 0 #9c7a5a, 
                0 30px 50px rgba(0,0,0,0.8);
            /* 讓裡面的元素也能繼承 3D 空間 */
            transform-style: preserve-3d;
        }

        canvas {
            display: block;
            border-radius: 50%;
            /* 讓 Canvas 服貼在轉盤表面 */
            width: 100%;
            height: 100%;
        }

        /* 手指旋轉容器 (懸浮在空中) */
        .pointer-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* 🌟 核心魔法：一樣向後倒，但用 translateZ 把它往「上」拉抬 50px，變成懸浮狀態 */
            transform: rotateX(60deg) translateZ(50px);
            transform-origin: center center;
            pointer-events: none; 
            z-index: 20;
        }

        /* 指針圖片設定 */
        .pointer-img {
            position: absolute;
            left: 50%;
            top: -20px; /* 位置微調，讓指尖剛好切到邊緣 */
            /* 手指原本是橫的，旋轉 90 度讓它朝下指 */
            transform: translateX(-50%) rotate(90deg); 
            width: 160px; 
            height: 100px; 
            /* 🌟 懸浮陰影：因為手浮在空中，所以陰影要偏移比較多，且比較模糊 */
            filter: drop-shadow(20px -20px 10px rgba(0,0,0,0.6));
        }

        .controls {
            text-align: center;
            z-index: 30;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            pointer-events: auto; 
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <audio id="spinSound" src="/audio/minnie.mp3" loop preload="auto"></audio>
    <audio id="stopSound" src="/audio/stop.mp3" preload="auto"></audio>

    <div class="scene">
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        
        <div id="pointerWrapper" class="pointer-wrapper">
            <img src="/img/image_5.png" id="pointerImg" class="pointer-img" alt="Pointer" />
        </div>
    </div>

    <div class="controls">
        <button id="spinBtn">點擊開始</button>
        <div id="result">準備好了嗎？</div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const spinSound = document.getElementById('spinSound');
        const stopSound = document.getElementById('stopSound');
        const pointerWrapper = document.getElementById('pointerWrapper');

        const segments = [
            { text: '沒中', color: '#e74c3c', icon: '❌' },
            { text: '車鑰匙', color: '#95a5a6', icon: '🔑' },
            { text: '手錶', color: '#f39c12', icon: '⌚' },
            { text: '100元', color: '#f1c40f', icon: '💵' },
            { text: '陀螺', color: '#ecf0f1', icon: '🌀' },
            { text: '手機', color: '#bdc3c7', icon: '📱' },
            { text: '小熊', color: '#e67e22', icon: '🧸' },
            { text: '金條', color: '#f1c40f', icon: '🥇' }
        ];

        const numSegments = segments.length;
        const radius = canvas.width / 2;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const arc = Math.PI * 2 / numSegments;

        let currentAngle = 0; 
        let isSpinning = false;
        let isStopping = false; 
        let spinVelocity = 0;
        let animationFrameId;

        // 繪製轉盤圖形
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                // 從正上方 (12點鐘方向) 開始畫
                const angle = (i * arc) - (Math.PI / 2); 
                
                ctx.beginPath();
                ctx.fillStyle = segments[i].color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = i === 0 ? "#fff" : "#333";
                ctx.font = "bold 24px sans-serif";
                
                ctx.fillText(segments[i].text, radius - 30, 10);
                ctx.font = "30px sans-serif";
                ctx.fillText(segments[i].icon, radius - 100, 10);
                ctx.restore();
            }
        }

        function animate() {
            if (isSpinning) {
                currentAngle += spinVelocity;

                if (isStopping) {
                    spinVelocity *= 0.985; 
                    
                    if (spinVelocity < 0.002) {
                        spinVelocity = 0;
                        isSpinning = false;
                        isStopping = false;
                        cancelAnimationFrame(animationFrameId);
                        checkResult();
                        return; 
                    }
                }

                if (currentAngle >= Math.PI * 2) {
                    currentAngle -= Math.PI * 2;
                }

                // 🌟 動畫更新：保持傾斜 (rotateX) 與懸浮高度 (translateZ)，只加上旋轉 (rotateZ)
                // 注意字串中的順序非常重要！
                pointerWrapper.style.transform = `rotateX(60deg) translateZ(50px) rotateZ(${currentAngle}rad)`;
                
                animationFrameId = requestAnimationFrame(animate);
            }
        }

        function checkResult() {
            let normalizedAngle = currentAngle % (Math.PI * 2);
            let winningSegmentIndex = Math.floor(normalizedAngle / arc);
            
            let winner = segments[winningSegmentIndex];
            resultDiv.innerText = winner.text === '沒中' ? "完，沒中！" : `恭喜你抽中：${winner.text} ${winner.icon}`;
            spinBtn.innerText = "再玩一次";
        }

        spinBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (isSpinning) return;
            
            isSpinning = true;
            isStopping = false;
            spinVelocity = 0.15; 
            
            resultDiv.innerText = "旋轉中... (點擊滑鼠左鍵停止)";
            spinBtn.innerText = "等待停止";
            
            spinSound.currentTime = 0;
            spinSound.play().catch(err => console.log("瀏覽器阻擋自動播放:", err));
            
            animate();
        });

        document.addEventListener('mousedown', (e) => {
            if (isSpinning && !isStopping && e.button === 0 && e.target !== spinBtn) {
                isStopping = true;
                
                spinSound.pause(); 
                stopSound.currentTime = 0; 
                stopSound.play().catch(err => console.log("播放停止音效失敗:", err));
            }
        });

        drawWheel();
    </script>
</body>
</html>
