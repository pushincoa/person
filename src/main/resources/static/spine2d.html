<!-- 引入 YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        let player1, player2;

        // 當 YouTube API 載入完成後會自動執行此函數
        function onYouTubeIframeAPIReady() {
            // 初始化兩個播放器
            player1 = new YT.Player('yt-player-1');
            player2 = new YT.Player('yt-player-2');

            // 設定滑鼠懸停事件
            setupHoverEvent('yt-container-1', player1);
            setupHoverEvent('yt-container-2', player2);
        }

        // 綁定 Hover 播放邏輯的共用函數
        function setupHoverEvent(containerId, playerInstance) {
            const container = document.getElementById(containerId);
            
            // 滑鼠移入：播放影片
            container.addEventListener('mouseenter', () => {
                if (playerInstance && typeof playerInstance.playVideo === 'function') {
                    playerInstance.playVideo();
                }
            });

            // 滑鼠移出：暫停影片
            container.addEventListener('mouseleave', () => {
                if (playerInstance && typeof playerInstance.pauseVideo === 'function') {
                    playerInstance.pauseVideo();
                }
            });
        }
    </script>
